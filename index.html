<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Web Scanner Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script async src="https://docs.opencv.org/4.5.4/opencv.js" id="opencv-js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col justify-between antialiased selection:bg-blue-500">

    <header class="p-4 bg-slate-800 border-b border-slate-700 flex justify-between items-center shadow-md">
        <h1 class="text-lg font-bold tracking-wide text-blue-400">📄 WebScanner v2.4</h1>
        <div id="statusOpenCV" class="text-xs bg-yellow-600 px-2 py-1 rounded font-medium animate-pulse">
            Memuat Modul Engine...
        </div>
    </header>

    <main class="flex-1 flex flex-col items-center justify-center p-2 w-full max-w-md mx-auto relative overflow-hidden">
        
        <div id="wrapperKamera" class="w-full relative bg-black rounded-xl overflow-hidden shadow-2xl border border-slate-700 h-[60vh] flex items-center justify-center">
            <video id="kamera" autoplay playsinline class="w-full h-full object-cover"></video>
            <div class="absolute top-3 left-3 bg-black/60 px-3 py-1 rounded-full text-xs border border-white/20">
                Mode: Kamera Belakang
            </div>
        </div>

        <div id="wrapperKoreksi" class="w-full hidden flex-col items-center relative">
            <p class="text-xs text-center text-yellow-400 mb-2 font-medium px-2">
                Atur 4 titik sudut agar pas di ujung dokumen kertas Anda
            </p>
            <div class="relative bg-black rounded-xl overflow-hidden shadow-2xl border border-slate-700 max-w-full">
                <canvas id="kanvasFoto" class="max-w-full h-auto block select-none"></canvas>
                
                <div class="absolute top-3 right-3 flex gap-2 z-10">
                    <button id="floatUndo" class="bg-black/70 hover:bg-black text-amber-400 p-2.5 rounded-lg border border-white/10 active:scale-90 transition text-sm flex items-center justify-center gap-1 font-semibold shadow-md" title="Mundur 1 Titik">
                        ↩️ Undo
                    </button>
                    <button id="floatReset" class="bg-black/70 hover:bg-black text-red-400 p-2.5 rounded-lg border border-white/10 active:scale-90 transition text-sm flex items-center justify-center gap-1 font-semibold shadow-md" title="Reset Semua Titik">
                        🗑️ Clear All
                    </button>
                </div>
            </div>
            <canvas id="kanvasHasil" class="hidden"></canvas>
        </div>

    </main>

    <footer class="p-4 bg-slate-800 border-t border-slate-700 w-full max-w-md mx-auto rounded-t-2xl shadow-inner">
        <div class="mb-4">
            <p class="text-xs text-slate-400 mb-2 font-semibold">Daftar Halaman (<span id="jumlahHalaman">0</span>) - <span class="text-blue-400 italic">Geser foto untuk ubah urutan PDF</span>:</p>
            <div id="containerThumbnail" class="flex gap-2 overflow-x-auto py-1 min-h-[70px] scrollbar-thin scrollbar-thumb-slate-600 dynamic-zone">
                <span id="placeholderThumb" class="text-xs text-slate-500 italic self-center pointer-events-none">Belum ada halaman yang diambil.</span>
            </div>
        </div>

        <div class="flex flex-col gap-3">
            <div id="aksiKamera" class="flex gap-2">
                <button id="btnAmbilFoto" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-4 rounded-xl shadow-lg transition flex justify-center items-center gap-2">
                    📸 Ambil Foto
                </button>
            </div>

            <div id="aksiKoreksi" class="flex flex-col gap-2 hidden">
                <div class="flex gap-2">
                    <button id="btnUlangFoto" class="flex-1 bg-slate-700 hover:bg-slate-600 text-white font-semibold py-3 px-2 rounded-xl transition">
                        ❌ Batal Potret
                    </button>
                </div>
                <button id="btnLuruskan" class="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-3 px-4 rounded-xl transition opacity-50 cursor-not-allowed" disabled>
                    📐 Luruskan & Simpan Halaman
                </button>
            </div>

            <button id="btnUnduhPDF" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 px-4 rounded-xl shadow-lg transition hidden justify-center items-center gap-2">
                📥 Selesai & Download PDF
            </button>
        </div>
    </footer>

    <div id="modalPreview" class="fixed inset-0 bg-black/95 z-50 hidden flex-col justify-between p-4 transition-all duration-300">
        <header class="flex justify-between items-center w-full max-w-md mx-auto py-2 border-b border-slate-800">
            <button id="btnHapusHalaman" class="bg-red-600 hover:bg-red-700 active:scale-95 text-white px-3 py-1.5 rounded-lg text-sm font-semibold transition flex items-center gap-1">
                🗑️ Ulangi / Hapus
            </button>
            <h3 class="text-md font-bold text-blue-400">🔍 Review Halaman</h3>
            <button id="btnTutupPreview" class="bg-slate-800 hover:bg-slate-700 active:scale-95 text-white px-4 py-1.5 rounded-lg text-sm font-semibold transition">
                Tutup
            </button>
        </header>
        <div class="flex-1 flex items-center justify-center p-2 w-full max-w-md mx-auto">
            <img id="imgPreviewBesar" src="" class="max-w-full max-h-[75vh] object-contain rounded-lg shadow-2xl border border-slate-700">
        </div>
        <footer class="w-full max-w-md mx-auto py-2 text-center text-xs text-slate-500">
            Urutan PDF mengikuti susunan thumbnail di layar utama.
        </footer>
    </div>

    <script>
        const video = document.getElementById('kamera');
        const kanvasFoto = document.getElementById('kanvasFoto');
        const kanvasHasil = document.getElementById('kanvasHasil');
        const statusOpenCV = document.getElementById('statusOpenCV');
        
        const wrapperKamera = document.getElementById('wrapperKamera');
        const wrapperKoreksi = document.getElementById('wrapperKoreksi');
        const containerThumbnail = document.getElementById('containerThumbnail');
        const placeholderThumb = document.getElementById('placeholderThumb');
        const jumlahHalaman = document.getElementById('jumlahHalaman');

        const modalPreview = document.getElementById('modalPreview');
        const imgPreviewBesar = document.getElementById('imgPreviewBesar');
        const btnTutupPreview = document.getElementById('btnTutupPreview');
        const btnHapusHalaman = document.getElementById('btnHapusHalaman');

        const btnAmbilFoto = document.getElementById('btnAmbilFoto');
        const btnUlangFoto = document.getElementById('btnUlangFoto');
        const btnLuruskan = document.getElementById('btnLuruskan');
        const btnUnduhPDF = document.getElementById('btnUnduhPDF');

        // Utilities Buttons
        const floatUndo = document.getElementById('floatUndo');
        const floatReset = document.getElementById('floatReset');

        let daftarHalamanPDF = []; 
        let titikKoordinat = []; 
        let fotoAsliData = null; 
        let rasioSkala = 1; 
        let currentIndexPreview = -1;

        Sortable.create(containerThumbnail, {
            animation: 180,
            ghostClass: 'bg-blue-900',
            filter: '.pointer-events-none',
            onEnd: function () {
                const urutanBaru = [];
                const imgs = containerThumbnail.querySelectorAll('.thumb-img');
                imgs.forEach(img => {
                    urutanBaru.push(img.src);
                });
                daftarHalamanPDF = urutanBaru;
                jumlahHalaman.textContent = daftarHalamanPDF.length;
            }
        });

        var document = document || {};
        document.getElementById('opencv-js').addEventListener('load', () => {
            statusOpenCV.textContent = "⚡ Engine Ready";
            statusOpenCV.classList.remove('bg-yellow-600', 'animate-pulse');
            statusOpenCV.classList.add('bg-green-600');
            startKamera();
        });

        async function startKamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: { ideal: 3840 }, height: { ideal: 2160 } }, // Request resolusi tertinggi kamera HP
                    audio: false
                });
                video.srcObject = stream;
            } catch (err) {
                // Fallback jika resolusi 4K tidak didukung hardware internal browser
                try {
                    const streamFallback = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } },
                        audio: false
                    });
                    video.srcObject = streamFallback;
                } catch(e) {
                    alert('Gagal mengakses kamera belakang: ' + e.message);
                }
            }
        }

        btnAmbilFoto.addEventListener('click', () => {
            if (typeof cv === 'undefined') {
                alert('Tunggu hingga core engine selesai dimuat!');
                return;
            }

            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = video.videoWidth;
            tempCanvas.height = video.videoHeight;
            const ctx = tempCanvas.getContext('2d');
            ctx.drawImage(video, 0, 0, tempCanvas.width, tempCanvas.height);

            fotoAsliData = new Image();
            fotoAsliData.src = tempCanvas.toDataURL('image/jpeg', 1.0); // Simpan kualitas mentah 100%
            fotoAsliData.onload = function() {
                bukaModeKoreksi(tempCanvas);
            };
        });

        function bukaModeKoreksi(srcTmpCanvas) {
            wrapperKamera.classList.add('hidden');
            document.getElementById('aksiKamera').classList.add('hidden');
            wrapperKoreksi.classList.remove('hidden');
            document.getElementById('aksiKoreksi').classList.remove('hidden');

            const maxDisplayWidth = window.innerWidth - 24; 
            rasioSkala = maxDisplayWidth / fotoAsliData.width;
            if (rasioSkala > 1) rasioSkala = 1;

            kanvasFoto.width = fotoAsliData.width * rasioSkala;
            kanvasFoto.height = fotoAsliData.height * rasioSkala;

            titikKoordinat = []; 
            
            // Proses Auto Contour Detection
            try {
                let srcMatFull = cv.imread(srcTmpCanvas);
                let gray = new cv.Mat();
                let blurred = new cv.Mat();
                let edges = new cv.Mat();
                
                cv.cvtColor(srcMatFull, gray, cv.COLOR_RGBA2GRAY);
                cv.GaussianBlur(gray, blurred, new cv.Size(5, 5), 0);
                cv.Canny(blurred, edges, 75, 200);
                
                let contours = new cv.MatVector();
                let hierarchy = new cv.Mat();
                cv.findContours(edges, contours, hierarchy, cv.RETR_LIST, cv.CHAIN_APPROX_SIMPLE);
                
                let maxArea = 0;
                let approxFourPoint = null;
                
                for (let i = 0; i < contours.size(); ++i) {
                    let cnt = contours.get(i);
                    let area = cv.contourArea(cnt);
                    // Filter kontur agar tidak mengambil area yang terlalu besar mendekati ukuran penuh layar
                    if (area > 5000 && area < (srcTmpCanvas.width * srcTmpCanvas.height * 0.85)) {
                        let approx = new cv.Mat();
                        let peri = cv.arcLength(cnt, true);
                        cv.approxPolyDP(cnt, approx, 0.02 * peri, true);
                        if (approx.rows === 4 && area > maxArea) {
                            maxArea = area;
                            if(approxFourPoint) approxFourPoint.delete();
                            approxFourPoint = approx;
                        } else {
                            approx.delete();
                        }
                    }
                }
                
                if (approxFourPoint) {
                    let pts = [];
                    for (let i = 0; i < 4; i++) {
                        pts.push({ x: approxFourPoint.data32F[i*2], y: approxFourPoint.data32F[i*2+1] });
                    }
                    
                    pts.sort((a, b) => a.y - b.y);
                    let topTwo = [pts[0], pts[1]].sort((a, b) => a.x - b.x);
                    let bottomTwo = [pts[2], pts[3]].sort((a, b) => a.x - b.x);
                    
                    titikKoordinat = [
                        { x: topTwo[0].x * rasioSkala, y: topTwo[0].y * rasioSkala },
                        { x: topTwo[1].x * rasioSkala, y: topTwo[1].y * rasioSkala },
                        { x: bottomTwo[1].x * rasioSkala, y: bottomTwo[1].y * rasioSkala },
                        { x: bottomTwo[0].x * rasioSkala, y: bottomTwo[0].y * rasioSkala }
                    ];
                    approxFourPoint.delete();
                }
                
                gray.delete(); blurred.delete(); edges.delete(); contours.delete(); hierarchy.delete(); srcMatFull.delete();
            } catch (e) {
                console.log("Auto detection error", e);
            }

            // PERBAIKAN: Jika auto select gagal/terlalu besar, buat kotak proporsional di tengah layar (padding 20%)
            if (titikKoordinat.length !== 4) {
                let w = kanvasFoto.width;
                let h = kanvasFoto.height;
                let padW = w * 0.20;
                let padH = h * 0.20;
                titikKoordinat = [
                    { x: padW, y: padH },
                    { x: w - padW, y: padH },
                    { x: w - padW, y: h - padH },
                    { x: padW, y: h - padH }
                ];
            }

            cekStatusTombolLuruskan();
            gambarUlangKanvas();
        }

        function gambarUlangKanvas() {
            const ctx = kanvasFoto.getContext('2d');
            ctx.clearRect(0, 0, kanvasFoto.width, kanvasFoto.height);
            ctx.drawImage(fotoAsliData, 0, 0, kanvasFoto.width, kanvasFoto.height);

            if (titikKoordinat.length > 1) {
                ctx.beginPath();
                ctx.moveTo(titikKoordinat[0].x, titikKoordinat[0].y);
                for (let i = 1; i < titikKoordinat.length; i++) {
                    ctx.lineTo(titikKoordinat[i].x, titikKoordinat[i].y);
                }
                if (titikKoordinat.length === 4) {
                    ctx.lineTo(titikKoordinat[0].x, titikKoordinat[0].y);
                }
                ctx.strokeStyle = '#22c55e'; 
                ctx.lineWidth = 2.5;
                ctx.stroke();
            }

            titikKoordinat.forEach((pt, index) => {
                ctx.beginPath();
                ctx.arc(pt.x, pt.y, 11, 0, 2 * Math.PI);
                ctx.fillStyle = '#3b82f6'; 
                ctx.fill();
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 2.5;
                ctx.stroke();

                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 11px sans-serif';
                ctx.fillText(index + 1, pt.x - 4, pt.y + 4);
            });
        }

        // Listener Ketukan Tunggal di Layar
        kanvasFoto.addEventListener('click', (e) => {
            if (titikKoordinat.length >= 4) return; 

            const rect = kanvasFoto.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            titikKoordinat.push({ x: x, y: y });
            gambarUlangKanvas();
            cekStatusTombolLuruskan();
        });

        // PERBAIKAN LOGIKA: Kontrol Undo & Reset Menggunakan Tombol Floating Spesifik
        floatUndo.addEventListener('click', (e) => {
            e.stopPropagation();
            if (titikKoordinat.length > 0) {
                titikKoordinat.pop(); // Mundur satu titik saja
                gambarUlangKanvas();
                cekStatusTombolLuruskan();
            }
        });

        floatReset.addEventListener('click', (e) => {
            e.stopPropagation();
            titikKoordinat = []; // Kosongkan total untuk input manual mandiri
            gambarUlangKanvas();
            cekStatusTombolLuruskan();
        });

        function cekStatusTombolLuruskan() {
            if (titikKoordinat.length === 4) {
                btnLuruskan.disabled = false;
                btnLuruskan.classList.remove('opacity-50', 'cursor-not-allowed');
            } else {
                btnLuruskan.disabled = true;
                btnLuruskan.classList.add('opacity-50', 'cursor-not-allowed');
            }
        }

        btnLuruskan.addEventListener('click', () => {
            if (titikKoordinat.length !== 4) return;

            const srcPoints = [];
            titikKoordinat.forEach(pt => {
                srcPoints.push(pt.x / rasioSkala);
                srcPoints.push(pt.y / rasioSkala);
            });

            // UPGRADE RESOLUSI: Menggunakan Ukuran Standar Kertas A4 pada Resolusi Cetak Jernih 300 DPI
            const lebarHasil = 2480;
            const tinggiHasil = 3508;

            kanvasHasil.width = lebarHasil;
            kanvasHasil.height = tinggiHasil;

            const srcTmpCanvas = document.createElement('canvas');
            srcTmpCanvas.width = fotoAsliData.width;
            srcTmpCanvas.height = fotoAsliData.height;
            srcTmpCanvas.getContext('2d').drawImage(fotoAsliData, 0, 0);
            let srcMatFull = cv.imread(srcTmpCanvas);

            let dstMat = new cv.Mat();
            let dsize = new cv.Size(lebarHasil, tinggiHasil);

            let srcTri = cv.matFromArray(4, 1, cv.CV_32FC2, srcPoints);
            let dstTri = cv.matFromArray(4, 1, cv.CV_32FC2, [
                0, 0,
                lebarHasil, 0,
                lebarHasil, tinggiHasil,
                0, tinggiHasil
            ]);

            let M = cv.getPerspectiveTransform(srcTri, dstTri);
            cv.warpPerspective(srcMatFull, dstMat, M, dsize, cv.INTER_LINEAR, cv.BORDER_CONSTANT, new cv.Scalar());
            
            cv.imshow(kanvasHasil, dstMat);

            // UPGRADE KUALITAS: Ubah rasio kompresi gambar JPEG menjadi 0.95 (Sangat Tajam)
            const scannedDataURL = kanvasHasil.toDataURL('image/jpeg', 0.95);
            daftarHalamanPDF.push(scannedDataURL);

            srcMatFull.delete(); dstMat.delete(); M.delete(); srcTri.delete(); dstTri.delete();

            renderUlangSemuaThumbnail();
            kembaliKeKamera();
        });

        function renderUlangSemuaThumbnail() {
            containerThumbnail.innerHTML = "";

            if (daftarHalamanPDF.length === 0) {
                placeholderThumb.classList.remove('hidden');
                containerThumbnail.appendChild(placeholderThumb);
                btnUnduhPDF.classList.add('hidden');
                jumlahHalaman.textContent = "0";
                return;
            }

            placeholderThumb.classList.add('hidden');
            btnUnduhPDF.classList.remove('hidden');
            btnUnduhPDF.classList.add('flex');
            jumlahHalaman.textContent = daftarHalamanPDF.length;

            daftarHalamanPDF.forEach((dataURL, idx) => {
                const thumbDiv = document.createElement('div');
                thumbDiv.className = "relative flex-shrink-0 border-2 border-blue-500 rounded-lg overflow-hidden w-12 h-16 bg-slate-700 shadow cursor-grab active:cursor-grabbing transition transform hover:scale-105";
                
                const img = document.createElement('img');
                img.src = dataURL;
                img.className = "w-full h-full object-cover thumb-img";
                
                thumbDiv.appendChild(img);

                thumbDiv.addEventListener('click', () => {
                    currentIndexPreview = idx;
                    imgPreviewBesar.src = dataURL;
                    modalPreview.classList.remove('hidden');
                    modalPreview.classList.add('flex');
                });

                containerThumbnail.appendChild(thumbDiv);
            });
        }

        btnHapusHalaman.addEventListener('click', () => {
            if (currentIndexPreview > -1) {
                daftarHalamanPDF.splice(currentIndexPreview, 1);
                modalPreview.classList.add('hidden');
                modalPreview.classList.remove('flex');
                imgPreviewBesar.src = "";
                currentIndexPreview = -1;
                renderUlangSemuaThumbnail();
            }
        });

        btnTutupPreview.addEventListener('click', () => {
            modalPreview.classList.add('hidden');
            modalPreview.classList.remove('flex');
            imgPreviewBesar.src = "";
            currentIndexPreview = -1;
        });

        btnUlangFoto.addEventListener('click', kembaliKeKamera);

        function kembaliKeKamera() {
            wrapperKoreksi.classList.add('hidden');
            document.getElementById('aksiKoreksi').classList.add('hidden');
            wrapperKamera.classList.remove('hidden');
            document.getElementById('aksiKamera').classList.remove('hidden');
            fotoAsliData = null;
        }

        btnUnduhPDF.addEventListener('click', () => {
            if (daftarHalamanPDF.length === 0) return;

            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4');

            daftarHalamanPDF.forEach((dataURL, index) => {
                if (index > 0) {
                    pdf.addPage();
                }
                pdf.addImage(dataURL, 'JPEG', 0, 0, 210, 297, undefined, 'FAST');
            });

            pdf.save('Hasil_Scan_Dokumen.pdf');
        });
    </script>
</body>
</html>
